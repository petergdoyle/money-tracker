services:
  money-tracker:
    build: .
    container_name: money-tracker
    restart: unless-stopped
    ports:
      - "8220:8220"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - proxy_network

networks:
  proxy_network:
    external: true
    name: proxy_network
